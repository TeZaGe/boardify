<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jobby Clipper</title>
  <style>
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #080b11;
      color: #f3f4f6;
      margin: 0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: linear-gradient(135deg, #8b5cf6 0%, #10b981 100%);
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 10px;
      color: white;
      font-size: 12px;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #8b5cf6;
    }
    button {
      width: 100%;
      background: #8b5cf6;
      border: none;
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #7c3aed;
    }
    .status {
      font-size: 11px;
      margin-top: 12px;
      text-align: center;
      color: #9ca3af;
    }
    .success {
      color: #10b981;
      font-weight: 500;
    }
    .info {
      font-size: 10px;
      color: #9ca3af;
      line-height: 1.4;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 8px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <span class="title">Jobby Clipper</span>
  </div>

  <div class="form-group">
    <label for="token">Jeton d'API Jobby CRM</label>
    <input type="password" id="token" placeholder="Insérer votre jeton (ex: demo-extension-token-123456)">
  </div>
  
  <button id="save">Enregistrer le jeton</button>
  
  <div id="status" class="status"></div>

  <div class="info">
    💡 <strong>Comment ça marche ?</strong> Une fois configurée, l'extension injectera automatiquement un bouton de sauvegarde sur les fiches de postes de <strong>Indeed</strong> et <strong>HelloWork</strong>.
  </div>

  <script src="popup.js"></script>
</body>
</html>
